<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeLog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" id="flatpickr-theme" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script type="text/javascript" src="/eel.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bgDark: '#1E2329', cardDark: '#2B3139', inputBgDark: '#3E4651',
                        bgLight: '#F3F4F6', cardLight: '#FFFFFF', inputBgLight: '#E5E7EB',
                        primary: '#26C0DB', crypto: '#4ECDC4',
                        danger: '#FF6B6B', success: '#0ECB81'
                    }
                }
            }
        }
    </script>
    <style>
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        body { transition: background-color 0.5s ease, color 0.5s ease; }
        .glass { transition: background-color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease; }
        .dark .glass { background: rgba(43, 49, 57, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #6b7280; }
        th.sortable { cursor: pointer; transition: background 0.2s; user-select: none; }
        th.sortable:hover { background: rgba(128,128,128,0.1); }
        input[type="checkbox"] {
            appearance: none; -webkit-appearance: none; background-color: #E5E7EB; margin: 0;
            width: 1.15rem; height: 1.15rem; border-radius: 0.25rem; display: grid; place-content: center;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid transparent;
        }
        .dark input[type="checkbox"] { background-color: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); }
        input[type="checkbox"]::before {
            content: ""; width: 0.65rem; height: 0.65rem; transform: scale(0);
            transition: 120ms transform ease-in-out; box-shadow: inset 1em 1em white;
            background-color: white; transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        input[type="checkbox"]:checked { background-color: #FF6B6B; border-color: #FF6B6B; }
        input[type="checkbox"]:checked::before { transform: scale(1); }
        input[type="checkbox"]:hover { transform: scale(1.1); }
        .sync-h { height: 42px; display: flex; align-items: center; }
        .table-num { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-variant-numeric: tabular-nums; }

        /* 導覽列 */
        .nav-item { position: relative; }
        .nav-item::after {
            content: attr(data-tooltip);
            position: absolute; left: calc(100% + 12px); top: 50%; transform: translateY(-50%);
            background: #2B3139; color: white; font-size: 12px; font-weight: 600;
            padding: 4px 10px; border-radius: 8px; white-space: nowrap;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item:hover::after { opacity: 1; }
        .nav-item.active { background: rgba(38, 192, 219, 0.15); }
        .nav-item.active iconify-icon { color: #26C0DB; }
    </style>
</head>
<body class="bg-bgLight dark:bg-bgDark text-gray-800 dark:text-white font-sans h-screen flex overflow-hidden">

    <!-- ==================== 最左側：64px 導覽列 ==================== -->
    <div class="w-16 glass m-4 mr-2 rounded-3xl flex flex-col items-center py-5 gap-2 shadow-2xl z-30 flex-shrink-0">
        <div class="bg-primary/10 dark:bg-primary/20 p-2 rounded-xl flex items-center justify-center shadow-inner border border-primary/20 mb-2">
            <iconify-icon icon="solar:notebook-bookmark-bold-duotone" class="text-primary text-2xl"></iconify-icon>
        </div>

        <button onclick="navigateTo('dashboard')" id="nav-dashboard"
            class="nav-item active w-11 h-11 rounded-xl flex items-center justify-center transition-all"
            data-tooltip="Dashboard">
            <iconify-icon icon="solar:home-bold-duotone" class="text-2xl"></iconify-icon>
        </button>

        <button onclick="navigateTo('holdings')" id="nav-holdings"
            class="nav-item w-11 h-11 rounded-xl flex items-center justify-center transition-all text-gray-400 dark:text-gray-500 hover:bg-inputBgLight dark:hover:bg-inputBgDark hover:text-gray-700 dark:hover:text-white"
            data-tooltip="持倉總覽">
            <iconify-icon icon="solar:case-bold-duotone" class="text-2xl"></iconify-icon>
        </button>

        <button onclick="navigateTo('charts')" id="nav-charts"
            class="nav-item w-11 h-11 rounded-xl flex items-center justify-center transition-all text-gray-400 dark:text-gray-500 hover:bg-inputBgLight dark:hover:bg-inputBgDark hover:text-gray-700 dark:hover:text-white"
            data-tooltip="圖表分析">
            <iconify-icon icon="solar:chart-bold-duotone" class="text-2xl"></iconify-icon>
        </button>

        <div class="flex-1"></div>

        <button onclick="toggleTheme()"
            class="nav-item w-11 h-11 rounded-full hover:bg-gray-200 dark:hover:bg-inputBgDark transition-colors flex items-center justify-center"
            data-tooltip="切換主題">
            <iconify-icon id="theme-icon" icon="solar:moon-stars-bold-duotone" class="text-2xl text-primary"></iconify-icon>
        </button>
    </div>

    <!-- ==================== 左側：輸入區 ==================== -->
    <div id="sidebar" class="w-[320px] glass m-4 ml-0 rounded-3xl p-6 flex flex-col shadow-2xl z-20 overflow-y-auto custom-scrollbar flex-shrink-0">
        <div class="flex bg-inputBgLight dark:bg-inputBgDark rounded-xl p-1 mb-5 transition-colors shadow-inner">
            <button onclick="setInputMarket('台股')" id="btn-in-tw" class="flex-1 py-2 rounded-lg text-sm font-bold bg-primary text-white dark:text-bgDark transition-all shadow-md flex justify-center items-center gap-1">
                <iconify-icon icon="ic:twotone-candlestick-chart" class="text-lg"></iconify-icon>台股
            </button>
            <button onclick="setInputMarket('美股')" id="btn-in-us" class="flex-1 py-2 rounded-lg text-sm font-bold text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-white transition-all flex justify-center items-center gap-1">
                <iconify-icon icon="solar:global-bold-duotone" class="text-lg"></iconify-icon>美股
            </button>
            <button onclick="setInputMarket('Crypto')" id="btn-in-crypto" class="flex-1 py-2 rounded-lg text-sm font-bold text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-white transition-all flex justify-center items-center gap-1">
                <iconify-icon icon="ic:twotone-currency-bitcoin" class="text-lg"></iconify-icon>Crypto
            </button>
        </div>

        <div id="form-container" class="space-y-4 flex-1 mt-1"></div>

        <button id="btn-save" onclick="saveRecord()" class="w-full mt-6 bg-primary hover:bg-cyan-400 text-white dark:text-bgDark font-bold py-3.5 rounded-xl transition transform hover:scale-[1.02] active:scale-[0.98] shadow-lg flex justify-center items-center gap-2 text-base">
            <iconify-icon icon="solar:diskette-bold" class="text-xl"></iconify-icon> 儲存紀錄
        </button>
        <button id="btn-cancel-edit" onclick="cancelEdit()" class="w-full mt-3 bg-gray-500 hover:bg-gray-400 text-white font-bold py-3.5 rounded-xl transition transform hover:scale-[1.02] active:scale-[0.98] shadow-lg flex justify-center items-center gap-2 text-base hidden">
            <iconify-icon icon="solar:close-circle-bold" class="text-xl"></iconify-icon> 取消編輯
        </button>
    </div>

    <!-- ==================== 右側：主內容區 ==================== -->
    <div class="flex-1 p-4 pl-2 flex flex-col overflow-hidden relative z-10">

        <!-- Dashboard 頁 -->
        <div id="page-dashboard">
            <!-- 統計卡 -->
            <div class="grid grid-cols-3 gap-6 mb-6" id="stats-cards">
                <div class="glass rounded-3xl p-6 shadow-xl relative overflow-hidden group">
                    <div class="absolute -right-6 -top-6 w-32 h-32 bg-blue-500 rounded-full opacity-10 blur-3xl group-hover:opacity-20 transition"></div>
                    <div class="flex justify-between items-center gap-4">
                        <div class="flex-1 min-w-0">
                            <h2 class="text-gray-500 dark:text-gray-400 text-sm font-bold">台股總盈虧 (TWD)</h2>
                            <div class="text-4xl lg:text-5xl font-bold mt-4 text-success table-num stat-value transition-all duration-300" id="stat-twd">$0</div>
                        </div>
                        <iconify-icon icon="solar:wallet-bold-duotone" class="text-6xl flex-shrink-0 text-blue-500 opacity-80 group-hover:scale-110 transition-transform"></iconify-icon>
                    </div>
                </div>
                <div class="glass rounded-3xl p-6 shadow-xl relative overflow-hidden group">
                    <div class="absolute -right-6 -top-6 w-32 h-32 bg-purple-500 rounded-full opacity-10 blur-3xl group-hover:opacity-20 transition"></div>
                    <div class="flex justify-between items-center gap-4">
                        <div class="flex-1 min-w-0">
                            <h2 class="text-gray-500 dark:text-gray-400 text-sm font-bold">美股總盈虧 (USD)</h2>
                            <div class="text-4xl lg:text-5xl font-bold mt-4 text-success table-num stat-value transition-all duration-300" id="stat-usd">$0.0</div>
                        </div>
                        <iconify-icon icon="solar:dollar-bold-duotone" class="text-6xl flex-shrink-0 text-purple-500 opacity-80 group-hover:scale-110 transition-transform"></iconify-icon>
                    </div>
                </div>
                <div class="glass rounded-3xl p-6 shadow-xl relative overflow-hidden group">
                    <div class="absolute -right-6 -top-6 w-32 h-32 bg-crypto rounded-full opacity-10 blur-3xl group-hover:opacity-20 transition"></div>
                    <div class="flex justify-between items-center gap-4">
                        <div class="flex-1 min-w-0">
                            <h2 class="text-gray-500 dark:text-gray-400 text-sm font-bold">Crypto 總盈虧 (USDT)</h2>
                            <div class="text-4xl lg:text-5xl font-bold mt-4 text-success table-num stat-value transition-all duration-300" id="stat-crypto">$0.0</div>
                        </div>
                        <iconify-icon icon="ic:twotone-currency-bitcoin" class="text-6xl flex-shrink-0 text-crypto opacity-80 group-hover:scale-110 transition-transform"></iconify-icon>
                    </div>
                </div>
            </div>

            <!-- 表格區 -->
            <div class="flex-1 glass rounded-3xl flex flex-col overflow-hidden shadow-xl" style="height: calc(100vh - 220px);">
                <div class="flex justify-between items-center border-b border-gray-200 dark:border-gray-700 bg-gray-50/50 dark:bg-cardDark/50 p-3 px-5 transition-colors">
                    <div class="flex bg-white dark:bg-bgDark rounded-xl p-1 shadow-sm border border-gray-200 dark:border-gray-600">
                        <button onclick="setViewMarket('台股')" id="btn-view-tw" class="px-5 py-2 rounded-lg text-sm font-bold bg-primary text-white dark:text-bgDark transition-all shadow-sm">檢視台股</button>
                        <button onclick="setViewMarket('美股')" id="btn-view-us" class="px-5 py-2 rounded-lg text-sm font-bold text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white transition-all">檢視美股</button>
                        <button onclick="setViewMarket('Crypto')" id="btn-view-crypto" class="px-5 py-2 rounded-lg text-sm font-bold text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white transition-all">檢視加密貨幣</button>
                    </div>
                    <div class="flex gap-4 items-center">
                        <div class="flex gap-1">
                            <button onclick="setTableTab('買入')" id="tab-buy" class="px-5 py-2 rounded-xl bg-inputBgLight dark:bg-inputBgDark text-primary font-bold transition flex items-center gap-1.5 shadow-sm border border-gray-200 dark:border-gray-600">
                                <iconify-icon icon="solar:cart-large-minimalistic-bold-duotone"></iconify-icon>買入紀錄
                            </button>
                            <button onclick="setTableTab('賣出')" id="tab-sell" class="px-5 py-2 rounded-xl text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-inputBgDark transition flex items-center gap-1.5">
                                <iconify-icon icon="solar:tag-price-bold-duotone"></iconify-icon>賣出紀錄
                            </button>
                        </div>
                        <button onclick="deleteSelected()" id="btn-batch-delete" class="hidden px-4 py-2 bg-danger/10 hover:bg-danger text-danger hover:text-white rounded-xl font-bold transition flex items-center gap-2 border border-danger/20">
                            <iconify-icon icon="solar:trash-bin-trash-bold"></iconify-icon> 刪除選取 (<span id="selected-count">0</span>)
                        </button>
                    </div>
                </div>
                <div class="flex-1 overflow-auto custom-scrollbar">
                    <table class="w-full text-center border-collapse min-w-[1000px] table-auto">
                        <thead class="text-gray-500 dark:text-gray-400 text-sm tracking-wider border-b border-gray-300 dark:border-gray-700 sticky top-0 bg-white/95 dark:bg-bgDark/95 backdrop-blur-md z-10" id="table-head"></thead>
                        <tbody id="table-body" class="text-sm text-gray-700 dark:text-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 持倉總覽頁 -->
        <div id="page-holdings" class="hidden h-full flex flex-col gap-6" >

            <!-- 頁面標題 -->
            <div class="flex items-center gap-3">
                <div class="bg-primary/10 dark:bg-primary/20 p-2 rounded-xl border border-primary/20">
                    <iconify-icon icon="solar:case-bold-duotone" class="text-primary text-2xl"></iconify-icon>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold">持倉總覽</h1>
                    <p class="text-xs text-gray-500 dark:text-gray-400">目前持有部位 · 移動平均成本法</p>
                </div>
                <button onclick="refreshHoldings()" class="ml-auto px-4 py-2 bg-primary/10 hover:bg-primary/20 text-primary rounded-xl font-bold transition flex items-center gap-2 text-sm border border-primary/20">
                    <iconify-icon icon="solar:refresh-bold-duotone"></iconify-icon> 重新整理
                </button>
            </div>

            <!-- 摘要統計卡 -->
            <div class="grid grid-cols-4 gap-4" id="holdings-container">
                <div class="glass rounded-2xl p-5 shadow-lg relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 w-24 h-24 bg-blue-500 rounded-full opacity-10 blur-2xl"></div>
                    <p class="text-xs text-gray-500 dark:text-gray-400 font-bold mb-2">台股持倉數</p>
                    <div class="text-3xl font-extrabold text-primary" id="h-tw-count">0</div>
                    <p class="text-xs text-gray-400 mt-1">支股票</p>
                </div>
                <div class="glass rounded-2xl p-5 shadow-lg relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 w-24 h-24 bg-purple-500 rounded-full opacity-10 blur-2xl"></div>
                    <p class="text-xs text-gray-500 dark:text-gray-400 font-bold mb-2">美股持倉數</p>
                    <div class="text-3xl font-extrabold text-purple-400" id="h-us-count">0</div>
                    <p class="text-xs text-gray-400 mt-1">支股票</p>
                </div>
                <div class="glass rounded-2xl p-5 shadow-lg relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 w-24 h-24 bg-blue-500 rounded-full opacity-10 blur-2xl"></div>
                    <p class="text-xs text-gray-500 dark:text-gray-400 font-bold mb-2">台股總成本</p>
                    <div class="text-2xl font-extrabold text-primary table-num" id="h-tw-cost">$0</div>
                    <p class="text-xs text-gray-400 mt-1">TWD</p>
                </div>
                <div class="glass rounded-2xl p-5 shadow-lg relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 w-24 h-24 bg-purple-500 rounded-full opacity-10 blur-2xl"></div>
                    <p class="text-xs text-gray-500 dark:text-gray-400 font-bold mb-2">美股總成本</p>
                    <div class="text-2xl font-extrabold text-purple-400 table-num" id="h-us-cost">$0.00</div>
                    <p class="text-xs text-gray-400 mt-1">USD</p>
                </div>
            </div>

            <!-- 持倉表格 -->
            <div class="flex-1 glass rounded-3xl flex flex-col overflow-hidden shadow-xl">
                <div class="flex-1 overflow-auto custom-scrollbar">
                    <table class="w-full text-center border-collapse table-auto">
                        <thead class="text-gray-500 dark:text-gray-400 text-sm tracking-wider border-b border-gray-300 dark:border-gray-700 sticky top-0 bg-white/95 dark:bg-bgDark/95 backdrop-blur-md z-10" id="holdings-thead"></thead>
                        <tbody id="holdings-tbody" class="text-sm text-gray-700 dark:text-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- ==================== 載入 JS ==================== -->
    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/holdings.js"></script>
    <script>
        window.onload = () => initDashboard();
    </script>
</body>
</html>
